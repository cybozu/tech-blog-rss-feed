name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # NOTE: UTCなので9時間引く
    # 毎週土曜日の午前9時に実行
    - cron: 0 0 * * 6
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v4

    - name: Setup node
      uses: actions/setup-node@v4
      with:
        node-version-file: .node-version
        cache: pnpm

    - uses: flatt-security/setup-takumi-guard-npm@8f53b50568e4466f2d92504f349c05b9ffcb8b59 # v1
      with:
        bot-id: ${{ vars.TAKUMI_GUARD_BOT_ID }}

    - name: Install dependencies
      run: pnpm install

    - name: Lint
      run: pnpm lint

  test:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v4

    - name: Setup node
      uses: actions/setup-node@v4
      with:
        node-version-file: .node-version
        cache: pnpm

    - uses: flatt-security/setup-takumi-guard-npm@8f53b50568e4466f2d92504f349c05b9ffcb8b59 # v1
      with:
        bot-id: ${{ vars.TAKUMI_GUARD_BOT_ID }}

    - name: Install dependencies
      run: pnpm install

    - name: Test
      run: pnpm test-coverage

  generate:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      id-token: write
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v4

    - name: Setup node
      uses: actions/setup-node@v4
      with:
        node-version-file: .node-version
        cache: pnpm

    - uses: flatt-security/setup-takumi-guard-npm@8f53b50568e4466f2d92504f349c05b9ffcb8b59 # v1
      with:
        bot-id: ${{ vars.TAKUMI_GUARD_BOT_ID }}

    - name: Install dependencies
      run: pnpm install

    - name: Generate feed
      run: pnpm feed-generate

    - name: Generate site
      run: pnpm site-build

    - name: Archive feed
      uses: actions/upload-artifact@v4
      with:
        name: feed-generate-results
        path: public/feeds
